spring.application.name=biblioteca-api
debug=false
server.port=8080

# Banco H2 em arquivo para manter os dados entre reinicios da aplicacao.
spring.datasource.url=jdbc:h2:file:./data/biblioteca-db;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.jwt.secret=SistemaBibliotecaFinal2026SecretKeyForJwtSigningWithEnoughLength
app.jwt.expiration-ms=86400000
